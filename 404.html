<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Rober González</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111110'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-size='19' font-weight='600' fill='%23f7f5f0'>R</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --text-main: #e8e6e1;
      --text-muted: #737373;
      --font-serif: 'EB Garamond', serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection { background: #84ff00; color: #000; }
    ::-moz-selection { background: #84ff00; color: #000; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-serif);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 2rem;
    }

    .content {
      text-align: left;
      max-width: min(90%, 38ch);
      opacity: 0;
      transform: translateY(18px);
      animation: reveal 700ms var(--ease-out-expo) 100ms forwards;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(1.8rem, 3.8vw, 4.5rem);
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 400;
      margin-bottom: 0.55em;
      font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
    }

    p {
      font-size: clamp(1.8rem, 3.8vw, 4.5rem);
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 400;
      color: var(--text-muted);
      font-feature-settings: "liga" 1, "dlig" 1, "calt" 1;
    }

    a {
      color: var(--text-main);
      text-decoration: none;
      font-style: italic;
      position: relative;
    }
    a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0.02em;
      width: 100%;
      height: 1px;
      background: currentColor;
      opacity: 0.3;
      transition: opacity 0.35s var(--ease-out-expo);
    }
    a:hover::after {
      opacity: 1;
    }
    a:focus-visible {
      outline: 2px solid var(--text-muted);
      outline-offset: 3px;
      border-radius: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .content {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>This page doesn't exist.</h1>
    <p>Back to <a href="https://rober.design">home</a></p>
  </div>
</body>
</html>
