<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&display=swap');

  @font-face {
    font-family: 'PPNeueBit';
    src: url('fonts/ppneue/PPNeueBit-Bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    color: #e8e6e1;
    font-family: 'Baskervville', serif;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  .content {
    padding: 80px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 1;
  }

  .top {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .name {
    font-family: 'PPNeueBit', monospace;
    font-weight: 700;
    font-size: 88px;
    line-height: 1;
    color: #e8e6e1;
  }

  .title {
    font-family: 'PPNeueBit', monospace;
    font-weight: 700;
    font-size: 40px;
    color: #737373;
    line-height: 1.2;
    max-width: 700px;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .tags {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'PPNeueBit', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #737373;
    border: 1px solid #262626;
    background: #171717;
    padding: 6px 14px;
    border-radius: 4px;
  }

  .url {
    font-family: 'PPNeueBit', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #737373;
  }

  /* Subtle grid pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Accent line */
  .accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #e8e6e1 0%, #383838 60%, transparent 100%);
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="accent"></div>
  <div class="content">
    <div class="top">
      <div class="name">Rober González</div>
      <div class="title">Senior Product Designer<br>focused on AI</div>
    </div>
    <div class="bottom">
      <div class="tags">
        <span class="tag">AI Products</span>
        <span class="tag">Design Systems</span>
        <span class="tag">User Research</span>
        <span class="tag">Frontend Code</span>
      </div>
      <div class="url">rober.design</div>
    </div>
  </div>
</body>
</html>
